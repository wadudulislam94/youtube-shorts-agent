name: YouTube Shorts Agent — Auto Post

on:
  schedule:
    # Runs every 4 hours = 6 Shorts per day (max within YouTube API quota)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  post-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 now

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install system deps (ffmpeg for MoviePy) ─────────────────────────
      - name: Install ffmpeg + fonts + libass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-roboto libass-dev
          echo "✅ FFmpeg: $(ffmpeg -version 2>&1 | head -1)"
          echo "✅ Roboto font: $(fc-list | grep -i roboto | head -3)"

      # ── 4. Install Python dependencies ──────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 5. Cache Whisper model (avoids re-downloading 74MB each run) ─────────
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: assets/whisper_models
          key: whisper-base-model-v1

      # ── 6. Write .env from GitHub Secrets ────────────────────────────────────
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}" >> .env
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "CONTENT_NICHE=anime" >> .env
          echo "SHORTS_PER_RUN=1" >> .env
          echo "SCHEDULE_INTERVAL_HOURS=4" >> .env
          echo "WHISPER_MODEL=base" >> .env
          echo "TTS_VOICE=random" >> .env
          echo "YOUTUBE_CLIENT_SECRETS=credentials/client_secrets.json" >> .env
          echo "YOUTUBE_TOKEN_FILE=credentials/youtube_token.json" >> .env
          echo "TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}" >> .env
          echo "INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}" >> .env
          echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "✅ .env created:"
          cat .env | sed 's/=.*/=***/' 


      # ── 7. Restore YouTube credentials from Secrets ──────────────────────────
      - name: Restore YouTube credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > credentials/client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > credentials/youtube_token.json

      # ── 7b. Download royalty-free background music (cached) ──────────────────
      - name: Cache background music
        uses: actions/cache@v4
        with:
          path: assets/music
          key: bgm-tracks-v2

      - name: Download background music tracks
        run: |
          mkdir -p assets/music
          # Only download if not already cached
          if [ ! -f assets/music/epic1.mp3 ]; then
            echo "Downloading royalty-free EPIC/CINEMATIC BGM tracks for anime..."
            curl -L -o assets/music/epic1.mp3 "https://cdn.pixabay.com/download/audio/2022/11/22/audio_febc508520.mp3" 2>/dev/null || true
            curl -L -o assets/music/epic2.mp3 "https://cdn.pixabay.com/download/audio/2023/04/10/audio_946e9bae24.mp3" 2>/dev/null || true
            curl -L -o assets/music/epic3.mp3 "https://cdn.pixabay.com/download/audio/2022/10/25/audio_fbc1e29494.mp3" 2>/dev/null || true
            # Remove any empty files
            find assets/music -size 0 -delete 2>/dev/null || true
            echo "BGM files: $(ls assets/music/ 2>/dev/null)"
          else
            echo "BGM tracks already cached."
          fi

      # ── 8. Run the pipeline ──────────────────────────────────────────────────
      - name: Run YouTube Shorts pipeline
        run: python -u main.py --once
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      # ── 9. Upload output logs as artifact (for debugging) ───────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
