name: YouTube Shorts Agent — Auto Post

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  post-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install system deps (ffmpeg for MoviePy) ─────────────────────────
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── 4. Install Python dependencies ──────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 5. Cache Whisper model (avoids re-downloading 74MB each run) ─────────
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: assets/whisper_models
          key: whisper-base-model-v1

      # ── 6. Write .env from GitHub Secrets ────────────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
          CONTENT_NICHE=art
          SHORTS_PER_RUN=1
          SCHEDULE_INTERVAL_HOURS=6
          WHISPER_MODEL=base
          TTS_VOICE=random
          YOUTUBE_CLIENT_SECRETS=credentials/client_secrets.json
          YOUTUBE_TOKEN_FILE=credentials/youtube_token.json
          EOF

      # ── 7. Restore YouTube credentials from Secrets ──────────────────────────
      - name: Restore YouTube credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > credentials/client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > credentials/youtube_token.json

      # ── 8. Run the pipeline ──────────────────────────────────────────────────
      - name: Run YouTube Shorts pipeline
        run: python -u main.py --once
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      # ── 9. Upload output logs as artifact (for debugging) ───────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
